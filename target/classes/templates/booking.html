<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Tickets - Movie Booking System</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Datepicker CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/css/bootstrap-datepicker.min.css">
    <style>
        .booking-container {
            background-color: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin: 30px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .time-slot {
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
        }
        .time-slot:hover {
            border-color: #0d6efd;
            transform: translateY(-2px);
        }
        .time-slot.selected {
            background-color: #0d6efd;
            color: white;
            border-color: #0d6efd;
        }
        .seat-selector {
            max-width: 200px;
        }
        .movie-info {
            border-left: 4px solid #0d6efd;
            padding-left: 20px;
        }
        .section-title {
            color: #0d6efd;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="bg-light">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Movie Booking System</a>
            <div class="navbar-nav ms-auto">
                <span th:if="${isLoggedIn}" class="navbar-text text-light me-3" 
                      th:text="${'Welcome, ' + username}"></span>
                <a th:if="${isLoggedIn}" class="btn btn-outline-light" 
                   href="/users/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="booking-container">
            <!-- Movie Information -->
            <div class="row mb-4">
                <div class="col-md-12">
                    <div class="movie-info">
                        <h2 th:text="${movie.title}">Movie Title</h2>
                        <div class="mb-2">
                            <span class="badge bg-primary me-2" th:text="${movie.genre}">Genre</span>
                            <span class="badge bg-secondary" th:text="${movie.duration + ' min'}">Duration</span>
                        </div>
                        <p class="text-muted" th:text="${'Price: $' + movie.price}">Price: $12.99</p>
                    </div>
                </div>
            </div>

            <!-- Booking Form -->
            <form id="bookingForm" th:action="@{/booking/confirm}" method="post">
                <input type="hidden" name="movieId" th:value="${movie.id}">
                
                <!-- Date Selection -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <h3 class="section-title">Select Date</h3>
                        <div class="input-group">
                            <input type="text" class="form-control" id="datepicker" name="bookingDate" 
                                   placeholder="Select date" required readonly>
                            <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                        </div>
                    </div>
                </div>

                <!-- Time Slots -->
                <div class="row mb-4">
                    <div class="col-12">
                        <h3 class="section-title">Select Time</h3>
                        <div class="row">
                            <div class="col-md-3 col-sm-6">
                                <div class="time-slot text-center" data-time="9:30 - 11:30">
                                    9:30 - 11:30
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-6">
                                <div class="time-slot text-center" data-time="1:30 - 3:30">
                                    1:30 - 3:30
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-6">
                                <div class="time-slot text-center" data-time="4:30 - 6:30">
                                    4:30 - 6:30
                                </div>
                            </div>
                            <div class="col-md-3 col-sm-6">
                                <div class="time-slot text-center" data-time="7:30 - 9:30">
                                    7:30 - 9:30
                                </div>
                            </div>
                        </div>
                        <input type="hidden" name="selectedTime" id="selectedTime" required>
                    </div>
                </div>

                <!-- Number of Seats -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <h3 class="section-title">Number of Seats</h3>
                        <div class="seat-selector">
                            <select class="form-select" name="numberOfSeats" id="numberOfSeats" required>
                                <option value="">Select seats</option>
                                <option value="1">1 seat</option>
                                <option value="2">2 seats</option>
                                <option value="3">3 seats</option>
                                <option value="4">4 seats</option>
                                <option value="5">5 seats</option>
                                <option value="6">6 seats</option>
                                <option value="7">7 seats</option>
                                <option value="8">8 seats</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Total Price -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <h3 class="section-title">Total Price</h3>
                        <h4 id="totalPrice">$0.00</h4>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="row">
                    <div class="col-12">
                        <button type="submit" class="btn btn-primary btn-lg px-5">
                            Confirm Booking
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.9.0/js/bootstrap-datepicker.min.js"></script>
    
    <script th:inline="javascript">
        const moviePrice = /*[[${movie.price}]]*/ 12.99;

        $(document).ready(function() {
            // Initialize datepicker
            $('#datepicker').datepicker({
                format: 'yyyy-mm-dd',
                startDate: new Date(),
                endDate: '+30d',
                autoclose: true,
                todayHighlight: true
            });

            // Time slot selection
            $('.time-slot').click(function() {
                $('.time-slot').removeClass('selected');
                $(this).addClass('selected');
                $('#selectedTime').val($(this).data('time'));
            });

            // Update total price when number of seats changes
            $('#numberOfSeats').change(function() {
                const seats = $(this).val();
                const total = seats * moviePrice;
                $('#totalPrice').text('$' + total.toFixed(2));
            });

            // Form validation
            $('#bookingForm').submit(function(e) {
                if (!$('#selectedTime').val()) {
                    e.preventDefault();
                    alert('Please select a time slot');
                }
            });
        });
    </script>
</body>
</html>
