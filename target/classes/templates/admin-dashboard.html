<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Online Movie Tickets</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --glass: rgba(30, 41, 59, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        h1 { font-size: 2.5rem; font-weight: 700; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: var(--danger); color: white; }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* Movie List Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            text-align: left;
            padding: 1rem;
            color: var(--text-muted);
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .movie-img {
            width: 40px;
            height: 60px;
            object-fit: cover;
            border-radius: 4px;
        }

        /* Form Styling */
        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus { border-color: var(--primary); }

        .booking-list {
            list-style: none;
        }

        .booking-item {
            padding: 1rem;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.3);
            margin-bottom: 0.75rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .booking-user { font-weight: 600; color: var(--primary); }
        .booking-details { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem; }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Admin Dashboard</h1>
            <div style="display: flex; gap: 1rem;">
                <a href="/" class="btn" style="color: var(--text-muted);">View Site</a>
                <a href="/users/logout" class="btn btn-danger">Logout</a>
            </div>
        </header>

        <div class="grid">
            <!-- Movie Management -->
            <div class="card">
                <h2 class="section-title">🎬 Manage Movies</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Poster</th>
                            <th>Title</th>
                            <th>Genre</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="movie : ${movies}">
                            <td><img th:src="${movie.imageUrl}" class="movie-img" alt="poster"></td>
                            <td th:text="${movie.title}">Movie Title</td>
                            <td th:text="${movie.genre}">Genre</td>
                            <td th:text="'$' + ${movie.price}">$12.99</td>
                            <td>
                                <form th:action="@{'/admin/movies/delete/' + ${movie.title}}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-danger" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;">Delete</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Add Movie Form -->
            <div class="card">
                <h2 class="section-title">➕ Add New Movie</h2>
                <form action="/admin/movies/add" method="post" enctype="multipart/form-data">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" name="title" placeholder="Enter movie title" required>
                    </div>
                    <div class="form-group">
                        <label>Genre</label>
                        <input type="text" name="genre" placeholder="Action, Sci-Fi, etc." required>
                    </div>
                    <div class="form-group">
                        <label>Duration (minutes)</label>
                        <input type="number" name="duration" placeholder="120" required>
                    </div>
                    <div class="form-group">
                        <label>Movie Poster (Image File)</label>
                        <input type="file" name="imageFile" accept="image/*" required>
                    </div>
                    <div class="form-group">
                        <label>Price ($)</label>
                        <input type="number" step="0.01" name="price" placeholder="12.99" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Add Movie</button>
                </form>

                <hr style="margin: 2rem 0; opacity: 0.1;">

                <h2 class="section-title">🎟️ Recent Bookings</h2>
                <div class="booking-list">
                    <div th:each="booking : ${bookings}" class="booking-item">
                        <div class="booking-user" th:text="${booking.username}">User</div>
                        <div class="booking-details">
                            <span th:text="${booking.movieTitle}">Movie</span> • 
                            <span th:text="${booking.numberOfSeats}">2</span> seats • 
                            <span th:text="${booking.status}">PENDING</span>
                        </div>
                    </div>
                    <div th:if="${#lists.isEmpty(bookings)}" style="color: var(--text-muted); text-align: center; padding: 1rem;">
                        No bookings found.
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
