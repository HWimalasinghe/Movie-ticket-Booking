<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MOVIEBOOK</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { font-family: 'Outfit', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 100% 0%, rgba(99, 102, 241, 0.15) 0, transparent 50%),
                              radial-gradient(circle at 0% 100%, rgba(192, 132, 252, 0.15) 0, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .auth-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: block;
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-label {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            margin-left: 0.5rem;
        }

        .form-control {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 0.8rem 1.2rem;
            color: #fff;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            color: #fff;
        }

        .btn-auth {
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 1rem;
            font-weight: 700;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .btn-auth:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .alert {
            border-radius: 16px;
            border: none;
            font-size: 0.9rem;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
        }

        .back-link span {
            color: var(--primary);
            font-weight: 600;
        }

        .error-message {
            color: #ef4444;
            font-size: 0.8rem;
            margin-top: 0.4rem;
            margin-left: 0.5rem;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="/" class="brand-logo">🎬 MOVIEBOOK</a>
    <h2 class="text-center fw-bold mb-4">Create Account</h2>
    
    <div th:if="${error}" class="alert alert-danger" role="alert">
        <span th:text="${error}"></span>
    </div>

    <form action="/users/register" method="post" onsubmit="return validateForm()">
        <div class="row">
            <div class="col-12 mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username" placeholder="Choose a username" required>
                <div id="usernameError" class="error-message"></div>
            </div>

            <div class="col-12 mb-3">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="you@example.com" required>
                <div id="emailError" class="error-message"></div>
            </div>

            <div class="col-12 mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required>
                <div id="passwordError" class="error-message"></div>
            </div>

            <div class="col-12 mb-4">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
                <div id="confirmPasswordError" class="error-message"></div>
            </div>
        </div>

        <button type="submit" class="btn btn-auth">Create Account</button>

        <a href="/users/login" class="back-link">Already have an account? <span>Sign In</span></a>
        <a href="/" class="back-link mt-2">← Back to Home</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function validateForm() {
        let isValid = true;
        const username = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Reset error messages
        document.getElementById('usernameError').textContent = '';
        document.getElementById('emailError').textContent = '';
        document.getElementById('passwordError').textContent = '';
        document.getElementById('confirmPasswordError').textContent = '';

        // Username validation
        if (username.length < 3) {
            document.getElementById('usernameError').textContent = 'Username must be at least 3 characters long';
            isValid = false;
        }

        // Email validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            document.getElementById('emailError').textContent = 'Please enter a valid email address';
            isValid = false;
        }

        // Password validation
        if (password.length < 6) {
            document.getElementById('passwordError').textContent = 'Password must be at least 6 characters long';
            isValid = false;
        }

        // Confirm password validation
        if (password !== confirmPassword) {
            document.getElementById('confirmPasswordError').textContent = 'Passwords do not match';
            isValid = false;
        }

        return isValid;
    }
</script>
</body>
</html>
